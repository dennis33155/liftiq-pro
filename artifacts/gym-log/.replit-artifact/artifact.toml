kind = "mobile"
previewPath = "/"
title = "LiftIQ"
version = "1.0.0"
id = "artifacts/gym-log"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 20088

[services.development]
run = "pnpm --filter @workspace/gym-log run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/gym-log", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/gym-log", "run", "serve" ]

[services.env]
PORT = "20088"
BASE_PATH = "/"
