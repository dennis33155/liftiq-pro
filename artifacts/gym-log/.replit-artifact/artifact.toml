kind = "web"
previewPath = "/"
title = "Gym Log"
version = "1.0.0"
id = "artifacts/gym-log"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20259

[services.development]
run = "pnpm --filter @workspace/gym-log run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/gym-log", "run", "build" ]
publicDir = "artifacts/gym-log/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20259"
BASE_PATH = "/"
